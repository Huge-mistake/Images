name: ImagesJAR
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: check
        uses: actions/checkout@v4

      - name: JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: mvn
        run: chmod +x mvnw || true

      - name: Build jar
        run: mvn clean package -DskipTests

      - name: create JAR
        run: |
          mkdir -p output
          find . -name "Images-*.jar" -not -path "*/target/*original*" | xargs cp -t output/ 2>/dev/null || true

      - name: build
        uses: actions/upload-artifact@v4
        with:
          name: Images-Plugin
          path: output/
